render:
  backend: matplotlib
  output_path: ../workspace/renders/well_log_render.pdf
  dpi: 300
document:
  name: "{WELL} Auto Layout"
  page:
    size: A4
    orientation: portrait
    continuous: true
    margin_left_mm: 8
    margin_right_mm: 8
    margin_top_mm: 8
    margin_bottom_mm: 8
    header_height_mm: 22
    track_header_height_mm: 10
    footer_height_mm: 10
  depth:
    unit: m
    scale: "1:200"
    major_step: 50
    minor_step: 10
  header:
    title: "{WELL}"
    subtitle: "Source: {SOURCE_FILENAME}"
    fields:
      - label: Well
        source_key: WELL
      - label: UWI
        source_key: UWI
      - label: Company
        source_key: COMP
  footer:
    lines:
      - Generated by well_log_os from {SOURCE_FILENAME}
  markers: []
  zones: []
auto_tracks:
  on_missing: skip
  max_tracks: 12
  depth_track:
    id: depth
    title: Depth
    width_mm: 16
    track_header:
      objects:
        - kind: title
          enabled: true
          line_units: 1
        - kind: scale
          enabled: true
          line_units: 1
        - kind: legend
          enabled: false
          reserve_space: true
          line_units: 2
  default_configure:
    width_mm: 28
    title_template: "{mnemonic} [{unit}]"
    track_header:
      objects:
        - kind: title
          enabled: true
          line_units: 1
        - kind: scale
          enabled: true
          line_units: 1
        - kind: legend
          enabled: true
          line_units: 2
    grid:
      major: true
      minor: true
      major_alpha: 0.35
      minor_alpha: 0.15
    style:
      color: "#1b5e20"
      line_width: 0.9
      line_style: "-"
      opacity: 1.0
    scale:
      kind: auto
      percentile_low: 2
      percentile_high: 98
      log_ratio_threshold: 200
      min_positive: 0.000001
  tracks: []
